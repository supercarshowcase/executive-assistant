    input, textarea, button { font-family: inherit; }
    textarea { -webkit-text-size-adjust: 100%; }

    .shell { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg,#1E293B,#0F172A); border-right: 1px solid #1E293B; display: flex; flex-direction: column; flex-shrink: 0; transition: transform .28s cubic-bezier(.4,0,.2,1); }

    @media (min-width: 768px) {

    .topbar { padding: 14px 28px; border-bottom: 1px solid #1E293B; display: flex; align-items: center; justify-content: space-between; background: rgba(15,23,42,.85); backdrop-filter: blur(12px); flex-shrink: 0; }

      .email-detail-subject { font-size: 16px; }
      .email-action-bar { flex-wrap: wrap; }
      .tab-btn { font-size: 12px; padding: 10px 8px; }
    }
  </style>

/* ─── Helpers ─── */
function greeting() { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; }
function fmtTime(d) { return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function isMobile() { return window.innerWidth < 768; }
function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function boldify(text) { return esc(text).replace(/\*\*(.*?)\*\*/g, '<strong style="color:#F1F5F9;font-weight:600">$1</strong>'); }

function respond(msg) {
  const l = msg.toLowerCase();
  if (l.includes("email")||l.includes("draft"))
    return "I'd be happy to help you draft that email. Here's a professional template:\n\n**Subject:** [Topic]\n\nDear [Recipient],\n\nI hope this message finds you well. I'm reaching out regarding [purpose].\n\n[Key points to cover]\n\nPlease let me know if you'd like to discuss further.\n\nBest regards,\nSaher\n\nWould you like me to customize this? Share the recipient, subject, and key points.";
  if (l.includes("meeting")||l.includes("prep")||l.includes("schedule"))
    return "Here's your meeting prep framework:\n\n**1. Objective** — Define the key outcome\n**2. Agenda** — 3-5 discussion points with time\n**3. Background** — Key data and context\n**4. Questions** — 2-3 strategic questions\n**5. Action items** — Expected next steps\n\nShare the meeting topic and I'll build a detailed prep brief.";
  if (l.includes("research")||l.includes("analyze")||l.includes("trend"))
    return "I'll help with that research. To give you the best analysis:\n\n**1. Scope** — What specific aspect?\n**2. Depth** — Quick overview or deep dive?\n**3. Format** — Summary, bullets, or full report?\n**4. Audience** — Who will see this?\n\nI'll put together key findings, data points, and actionable insights.";
  if (l.includes("task")||l.includes("to-do")||l.includes("todo")||l.includes("priorit"))
    return "Let's organize your tasks:\n\n**Urgent & Important** — Do first\n• [Critical deadlines]\n\n**Important, Not Urgent** — Schedule\n• [Strategic work]\n\n**Urgent, Not Important** — Delegate\n• [Routine requests]\n\n**Neither** — Defer or eliminate\n\nTell me what's on your plate and I'll prioritize everything.";
  if (l.includes("write")||l.includes("document")||l.includes("report"))
    return "Ready to help you write. I'll need:\n\n**1. Type** — Report, memo, proposal?\n**2. Audience** — Who reads this?\n**3. Key message** — Main takeaway?\n**4. Tone** — Formal, conversational, persuasive?\n**5. Length** — Rough target?\n\nShare these and I'll create a polished draft.";
  if (l.includes("brainstorm")||l.includes("idea"))
    return "Let's brainstorm! Tell me:\n\n• What problem are you solving?\n• Any constraints?\n• What's been tried before?\n\nI'll generate ideas from multiple angles — conventional, creative, and wild cards. What topic should we explore?";
  if (l.includes("aamir")||l.includes("follow up")||l.includes("follow-up")||l.includes("4650"))

  html += `<div class="sidebar ${state.sidebarOpen?'open':''}">`;
  html += `<div style="padding:20px;border-bottom:1px solid rgba(148,163,184,.1);display:flex;align-items:center;justify-content:space-between">`;
  html += `<div style="display:flex;align-items:center;gap:12px"><div class="avatar" style="width:36px;height:36px"><i data-lucide="sparkles" style="width:18px;height:18px;color:white"></i></div><div><div style="font-weight:700;font-size:15px;color:#F8FAFC">Executive AI</div><div style="font-size:11px;color:#64748B">Your personal assistant</div></div></div>`;
  if (mob) html += `<button onclick="closeSidebar()" style="background:none;border:none;color:#94A3B8;cursor:pointer;padding:4px"><i data-lucide="x" style="width:20px;height:20px"></i></button>`;
  html += `</div>`;

  html += `<div style="padding:12px 16px"><button onclick="newChat()" style="width:100%;padding:10px 14px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:8px;color:#A5B4FC;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500"><i data-lucide="plus" style="width:16px;height:16px"></i> New Conversation</button></div>`;

  html += `<div style="padding:4px 8px;flex:1;overflow-y:auto"><div style="font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:8px 12px 6px">Categories</div>`;
  CATEGORIES.forEach(c => {
    html += `<button class="sidebar-btn ${state.category===c.id?'active':''}" onclick="setCategory('${c.id}')"><i data-lucide="${c.icon}" style="width:16px;height:16px"></i> ${c.label}</button>`;
  });
  html += `</div>`;

  html += `<div style="padding:12px 16px;border-top:1px solid rgba(148,163,184,.1);display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#EC4899);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white">S</div><div><div style="font-size:13px;font-weight:600;color:#F1F5F9">Saher</div><div style="font-size:11px;color:#64748B">Modus Real Estate</div></div></div>`;
  html += `</div>`;

  /* Main */
  html += `<div class="main">`;

  /* Topbar */
  html += `<div class="topbar">`;
  html += `<div style="display:flex;align-items:center;gap:10px">`;
  if (mob) html += `<button class="hamburger" onclick="openSidebar()" style="background:none;border:none;color:#94A3B8;cursor:pointer;padding:4px;margin-right:4px"><i data-lucide="menu" style="width:20px;height:20px"></i></button>`;
  const viewIcon = state.view === "email" ? "mail" : "message-square";
  const viewLabel = state.view === "email" ? (state.selectedEmail ? "Email" : "Inbox") : (has ? "Conversation" : "Home");
  html += `<i data-lucide="${viewIcon}" style="width:18px;height:18px;color:#6366F1"></i><span style="font-weight:600;font-size:15px;color:#F1F5F9">${viewLabel}</span>`;
  html += `</div>`;
  html += `<div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:#22C55E"></div><span style="font-size:12px;color:#64748B">Online</span></div>`;
  html += `</div>`;

  /* Tab bar */
  html += `<div class="tab-bar">`;
  html += `<button class="tab-btn ${state.view==='chat'?'active':''}" onclick="switchView('chat')"><i data-lucide="message-square" style="width:15px;height:15px"></i> Chat</button>`;
  html += `<button class="tab-btn ${state.view==='email'?'active':''}" onclick="switchView('email')"><i data-lucide="mail" style="width:15px;height:15px"></i> Email ${unreadCount?`<span class="badge">${unreadCount}</span>`:''}</button>`;
  html += `</div>`;

  /* Content */
  html += `<div class="content">`;

  if (state.view === "email") {
    html += renderEmailView(mob);
  } else {
    html += renderChatView(mob, has, filtered, today);
  }

  html += `</div>`; // end content

  /* Input bar (chat only) */
  if (state.view === "chat") {
    const canSend = state.input.trim() && !state.typing;
    html += `<div class="inputbar"><div style="max-width:720px;margin:0 auto">`;
    html += `<div class="send-wrap"><textarea class="send-input" id="msg-input" rows="1" placeholder="${mob?'Ask me anything...':'Ask me anything — emails, meetings, research, tasks...'}" oninput="onInput(event)" onkeydown="onKey(event)">${esc(state.input)}</textarea>`;
    html += `<button class="send-btn ${canSend?'active':'inactive'}" onclick="sendFromInput()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${canSend?'white':'#475569'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>`;
    html += `</div>`;
    if (!mob) html += `<div style="text-align:center;margin-top:8px;font-size:11px;color:#334155">Executive AI Assistant — Always ready to help</div>`;
    html += `</div></div>`;
  }

  html += `</div>`; // end main

  document.getElementById("app").innerHTML = `<div class="shell">${html}</div>`;
  lucide.createIcons();

  const anchor = document.getElementById("scroll-anchor");
  if (anchor) anchor.scrollIntoView({ behavior: "smooth" });

  const inp = document.getElementById("msg-input");
  if (inp) inp.value = state.input;
}

function renderEmailView(mob) {
  let html = "";

  if (state.selectedEmail !== null) {
    const e = EMAILS.find(em => em.id === state.selectedEmail);
    if (!e) return "";
    const initials = e.from.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

    html += `<div class="email-detail">`;
    html += `<button class="back-btn" onclick="backToInbox()"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> Back to Inbox</button>`;
    html += `<div class="email-detail-header">`;
    html += `<div class="email-detail-subject">${esc(e.subject)}</div>`;
    html += `<div class="email-detail-meta">`;
    html += `<div class="email-detail-avatar" style="background:${e.avatarColor}">${initials}</div>`;
    html += `<div><div style="font-size:14px;font-weight:600;color:#F1F5F9">${esc(e.from)}</div><div style="font-size:12px;color:#64748B">${esc(e.email)} · ${e.date}</div></div>`;
    html += `</div></div>`;
    if (e.label) html += `<span class="email-label" style="background:${e.labelColor}22;color:${e.labelColor};margin-bottom:12px">${e.label}</span>`;
    html += `<div class="email-detail-body">${esc(e.body)}</div>`;
    html += `<div class="email-action-bar">`;
    html += `<button class="email-action-btn primary" onclick="replyToEmail(${e.id})"><i data-lucide="corner-up-left" style="width:14px;height:14px"></i> Reply</button>`;
    html += `<button class="email-action-btn" onclick="draftFollowUp(${e.id})"><i data-lucide="pen-tool" style="width:14px;height:14px"></i> AI Draft</button>`;
    html += `<button class="email-action-btn"><i data-lucide="forward" style="width:14px;height:14px"></i> Forward</button>`;
    html += `</div></div>`;
  } else {
    /* Inbox header */
    html += `<div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between">`;
    html += `<div><span style="font-size:15px;font-weight:600;color:#F1F5F9">Inbox</span><span style="font-size:12px;color:#64748B;margin-left:8px">saher@modusrealestate.com</span></div>`;
    html += `<div style="font-size:11px;color:#475569">${EMAILS.filter(e=>e.unread).length} unread</div>`;
    html += `</div>`;

    EMAILS.forEach(e => {
      const initials = e.from.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      html += `<div class="email-item ${e.unread?'unread':''}" onclick="openEmail(${e.id})">`;
      html += `<div class="email-dot ${e.unread?'':'read'}"></div>`;
      html += `<div style="width:32px;height:32px;border-radius:8px;background:${e.avatarColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${initials}</div>`;
      html += `<div class="email-body">`;
      html += `<div class="email-header"><span class="email-from">${esc(e.from)}</span><span class="email-date">${e.date}</span></div>`;
      html += `<div class="email-subject">${e.label?`<span class="email-label" style="background:${e.labelColor}22;color:${e.labelColor}">${e.label}</span>`:''}${esc(e.subject)}</div>`;
      html += `<div class="email-snippet">${esc(e.snippet)}</div>`;
      html += `</div></div>`;
    });
  }

  return html;
}

function renderChatView(mob, has, filtered, today) {
  let html = `<div class="content-inner" style="max-width:720px;margin:0 auto;padding:${mob?'20px 16px':'48px 28px'}">`;

  if (!has) {
    if (mob && state.installHint) {
      html += `<div class="install-hint"><i data-lucide="share" style="width:16px;height:16px;flex-shrink:0"></i><span style="flex:1">Tap <strong>Share → Add to Home Screen</strong> to use like a native app</span><button onclick="dismissInstall()" style="background:none;border:none;color:#64748B;cursor:pointer;padding:2px"><i data-lucide="x" style="width:14px;height:14px"></i></button></div>`;
    }

    html += `<div style="margin-bottom:${mob?28:40}px">`;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><i data-lucide="coffee" style="width:18px;height:18px;color:#F59E0B"></i><span style="font-size:12px;color:#F59E0B;font-weight:500">${today}</span></div>`;
    html += `<h1 class="greeting-title" style="font-size:28px;font-weight:700;color:#F8FAFC;margin:0 0 6px;letter-spacing:-.02em">${greeting()}, Saher</h1>`;
    html += `<p style="font-size:${mob?14:15}px;color:#94A3B8;margin:0;line-height:1.5">How can I help you today?</p></div>`;

    html += `<div style="margin-bottom:${mob?28:36}px"><div style="font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Suggestions</div>`;
    html += `<div class="suggestions-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    SUGGESTIONS.forEach(s => {
      html += `<button class="suggestion-btn" onclick="sendMsg('${esc(s.text)}')"><i data-lucide="${s.icon}" style="width:16px;height:16px;flex-shrink:0;color:#6366F1"></i><span style="flex:1">${esc(s.text)}</span><i data-lucide="arrow-right" style="width:14px;height:14px;flex-shrink:0;opacity:.4"></i></button>`;
    });
    html += `</div></div>`;

    html += `<div><div style="font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Quick Actions</div>`;
    html += `<div class="chips">`;
    CATEGORIES.forEach(c => {
      html += `<button class="chip ${state.category===c.id?'active':''}" onclick="setCategory('${c.id}')">${c.label}</button>`;
    });
    html += `</div>`;
    html += `<div class="actions-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">`;
    filtered.forEach(a => {
      html += `<button class="action-btn" onclick="fillInput('${esc(a.prompt)} ')"><div class="icon-circle" style="background:${a.color}18"><i data-lucide="${a.icon}" style="width:16px;height:16px;color:${a.color}"></i></div>${a.label}</button>`;
    });
    html += `</div></div>`;
  } else {
    state.messages.forEach(m => {
      html += `<div class="msg-row ${m.role}">`;
      if (m.role === "assistant") html += `<div class="avatar" style="width:${mob?28:32}px;height:${mob?28:32}px;margin-top:2px"><i data-lucide="sparkles" style="width:${mob?13:15}px;height:${mob?13:15}px;color:white"></i></div>`;
      html += `<div class="msg-bubble ${m.role}">${boldify(m.content)}<div class="msg-time ${m.role}">${fmtTime(m.time)}</div></div>`;
      html += `</div>`;
    });
    if (state.typing) {
      html += `<div class="msg-row"><div class="avatar" style="width:${mob?28:32}px;height:${mob?28:32}px"><i data-lucide="sparkles" style="width:${mob?13:15}px;height:${mob?13:15}px;color:white"></i></div><div class="msg-bubble assistant"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
    }
    html += `<div id="scroll-anchor"></div>`;
  }

  html += `</div>`;
  return html;
}

/* ─── Actions ─── */
function openSidebar() { state.sidebarOpen=true; render(); }
function closeSidebar() { state.sidebarOpen=false; render(); }
function newChat() { state.messages=[]; state.sidebarOpen=false; state.view="chat"; render(); }
function setCategory(id) { state.category=id; state.sidebarOpen=false; render(); }
function dismissInstall() { state.installHint=false; render(); }
function switchView(v) { state.view=v; state.selectedEmail=null; render(); }
function openEmail(id) { state.selectedEmail=id; render(); }
function backToInbox() { state.selectedEmail=null; render(); }

function replyToEmail(id) {
  const e = EMAILS.find(em=>em.id===id);
  state.view = "chat";
  state.selectedEmail = null;
  sendMsg("Help me reply to the email from " + e.from + " about: " + e.subject);
}

function draftFollowUp(id) {
  const e = EMAILS.find(em=>em.id===id);
  state.view = "chat";
  state.selectedEmail = null;
  sendMsg("Draft a follow-up email to " + e.from + " (" + e.email + ") regarding: " + e.subject);
}

function fillInput(text) {
  state.input = text; render();
  const inp = document.getElementById("msg-input");
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function onInput(e) {
  state.input = e.target.value;
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
}

function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendFromInput(); } }

function sendFromInput() {
  if (!state.input.trim() || state.typing) return;
  sendMsg(state.input.trim());
}

function sendMsg(text) {
  state.messages.push({ role: "user", content: text, time: new Date() });
  state.input = "";
  state.typing = true;
  state.sidebarOpen = false;
  state.view = "chat";
  render();
  setTimeout(() => {
    state.messages.push({ role: "assistant", content: respond(text), time: new Date() });
    state.typing = false;
    render();
  }, 700 + Math.random() * 1000);
}

/* ─── Init ─── */
window.addEventListener("resize", render);
render();
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
</script>
</body>
</html>
