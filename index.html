<!DOCTYPE html>
<html lang="en">

  <meta name="theme-color" content="#0F172A" />
  <meta name="description" content="Executive AI Assistant for Saher" />

  <title>Executive AI — Saher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #E2E8F0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    input, textarea, button { font-family: inherit; }
    textarea { -webkit-text-size-adjust: 100%; }

    .shell { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg,#1E293B,#0F172A); border-right: 1px solid #1E293B; display: flex; flex-direction: column; flex-shrink: 0; transition: transform .28s cubic-bezier(.4,0,.2,1); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); z-index: 40; }
    .overlay.open { display: block; }
    @media (max-width: 767px) {
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.5); width: 280px; }
      .sidebar.open { transform: translateX(0); }
    }
    @media (min-width: 768px) {
      .overlay { display: none !important; }
      .hamburger { display: none !important; }
    }

    .topbar { padding: 14px 28px; border-bottom: 1px solid #1E293B; display: flex; align-items: center; justify-content: space-between; background: rgba(15,23,42,.85); backdrop-filter: blur(12px); flex-shrink: 0; }
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .inputbar { padding: 16px 28px 20px; border-top: 1px solid #1E293B; background: rgba(15,23,42,.9); backdrop-filter: blur(12px); flex-shrink: 0; }

    @media (max-width: 767px) {
      .topbar { padding: 12px 16px; }
      .inputbar { padding: 10px 12px 14px; }
      .content-inner { padding: 20px 16px !important; }
      .msg-bubble { max-width: 85% !important; font-size: 13px !important; }
      .greeting-title { font-size: 22px !important; }
      .actions-grid { grid-template-columns: repeat(2,1fr) !important; }
      .suggestions-grid { grid-template-columns: 1fr !important; }
    }

    .install-hint { margin: 12px 16px 0; padding: 10px 14px; background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25); border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #A5B4FC; }

    .chips { display: none; gap: 6px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    @media (max-width: 767px) { .chips { display: flex; } }
    .chip { padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(148,163,184,.15); background: transparent; color: #94A3B8; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .chip.active { border-color: rgba(99,102,241,.4); background: rgba(99,102,241,.15); color: #A5B4FC; }

    .sidebar-btn { width: 100%; padding: 10px 12px; background: transparent; border: none; border-radius: 8px; color: #94A3B8; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 2px; text-align: left; }
    .sidebar-btn.active { background: rgba(99,102,241,.15); color: #A5B4FC; font-weight: 500; }
    .sidebar-btn:hover { background: rgba(148,163,184,.08); }
    .sidebar-btn.active:hover { background: rgba(99,102,241,.2); }

    .suggestion-btn { padding: 14px 16px; background: rgba(30,41,59,.6); border: 1px solid rgba(148,163,184,.1); border-radius: 12px; color: #CBD5E1; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 13px; text-align: left; line-height: 1.4; -webkit-tap-highlight-color: transparent; transition: background .15s, border-color .15s; }
    .suggestion-btn:hover { background: rgba(99,102,241,.1); border-color: rgba(99,102,241,.3); }

    .action-btn { padding: 16px 12px; background: rgba(30,41,59,.6); border: 1px solid rgba(148,163,184,.08); border-radius: 12px; color: #CBD5E1; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; text-align: center; -webkit-tap-highlight-color: transparent; transition: background .15s, border-color .15s, transform .15s; }
    .action-btn:hover { background: rgba(30,41,59,.9); transform: translateY(-2px); }

    .icon-circle { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

    .dots { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: #94A3B8; animation: bounce 1.4s ease-in-out infinite both; }
    .dots span:nth-child(2) { animation-delay: .16s; }
    .dots span:nth-child(3) { animation-delay: .32s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

    .avatar { border-radius: 10px; background: linear-gradient(135deg,#6366F1,#8B5CF6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .msg-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-bubble { max-width: 80%; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .msg-bubble.user { border-radius: 16px 16px 4px 16px; background: linear-gradient(135deg,#4F46E5,#6366F1); color: #F8FAFC; }
    .msg-bubble.assistant { border-radius: 16px 16px 16px 4px; background: rgba(30,41,59,.8); border: 1px solid rgba(148,163,184,.1); color: #CBD5E1; }
    .msg-bubble strong { color: #F1F5F9; font-weight: 600; }
    .msg-time { font-size: 10px; margin-top: 6px; }
    .msg-time.user { color: rgba(255,255,255,.5); text-align: right; }
    .msg-time.assistant { color: #475569; }

    .send-wrap { display: flex; align-items: flex-end; gap: 8px; background: rgba(30,41,59,.8); border: 1px solid rgba(148,163,184,.15); border-radius: 14px; padding: 4px 4px 4px 14px; }
    .send-wrap:focus-within { border-color: rgba(99,102,241,.4); }
    .send-input { flex: 1; background: transparent; border: none; outline: none; color: #E2E8F0; font-size: 14px; resize: none; padding: 10px 0; line-height: 1.5; max-height: 120px; overflow-y: auto; }
    @media (max-width: 767px) { .send-input { font-size: 16px; } }
    .send-btn { width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: background .15s; }
    .send-btn.active { background: linear-gradient(135deg,#6366F1,#8B5CF6); }
    .send-btn.inactive { background: rgba(148,163,184,.1); cursor: default; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #1E293B; background: rgba(15,23,42,.6); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 10px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: #64748B; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
    .tab-btn.active { color: #A5B4FC; border-bottom-color: #6366F1; }
    .tab-btn:hover { color: #CBD5E1; }
    .tab-btn .badge { background: #EF4444; color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

    /* Email styles */
    .email-item { padding: 14px 20px; border-bottom: 1px solid rgba(148,163,184,.06); cursor: pointer; transition: background .12s; display: flex; gap: 12px; }
    .email-item:hover { background: rgba(99,102,241,.06); }
    .email-item.unread .email-subject { color: #F1F5F9; font-weight: 600; }
    .email-item.unread .email-from { color: #E2E8F0; font-weight: 600; }
    .email-dot { width: 8px; height: 8px; border-radius: 50%; background: #6366F1; flex-shrink: 0; margin-top: 6px; }
    .email-dot.read { background: transparent; }
    .email-body { flex: 1; min-width: 0; }
    .email-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 2px; }
    .email-from { font-size: 13px; color: #94A3B8; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-date { font-size: 11px; color: #475569; flex-shrink: 0; }
    .email-subject { font-size: 13px; color: #94A3B8; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-snippet { font-size: 12px; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-label { display: inline-block; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-right: 4px; text-transform: uppercase; letter-spacing: .04em; }

    /* Email detail view */
    .email-detail { padding: 24px 20px; }
    .email-detail-header { margin-bottom: 20px; }
    .email-detail-subject { font-size: 18px; font-weight: 700; color: #F8FAFC; margin-bottom: 12px; line-height: 1.3; }
    .email-detail-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .email-detail-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .email-detail-body { font-size: 14px; line-height: 1.7; color: #CBD5E1; white-space: pre-wrap; }
    .email-action-bar { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(148,163,184,.1); }
    .email-action-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(148,163,184,.15); background: rgba(30,41,59,.6); color: #CBD5E1; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; }
    .email-action-btn:hover { background: rgba(99,102,241,.1); border-color: rgba(99,102,241,.3); }
    .email-action-btn.primary { background: rgba(99,102,241,.15); border-color: rgba(99,102,241,.3); color: #A5B4FC; }
    .back-btn { background: none; border: none; color: #94A3B8; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 16px; padding: 4px 0; }
    .back-btn:hover { color: #E2E8F0; }

    /* Gmail connect styles */
    .gmail-connect { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; text-align: center; }
    .gmail-connect-icon { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, rgba(99,102,241,.15), rgba(139,92,246,.15)); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .gmail-connect h2 { font-size: 20px; font-weight: 700; color: #F8FAFC; margin-bottom: 8px; }
    .gmail-connect p { font-size: 14px; color: #94A3B8; margin-bottom: 24px; line-height: 1.5; max-width: 360px; }
    .gmail-connect-btn { padding: 12px 28px; background: linear-gradient(135deg,#4F46E5,#6366F1); border: none; border-radius: 10px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform .15s, box-shadow .15s; }
    .gmail-connect-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.3); }
    .gmail-connect-btn:active { transform: translateY(0); }

    /* Loading spinner */
    .email-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(99,102,241,.2); border-top-color: #6366F1; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Refresh button */
    .refresh-btn { background: none; border: none; color: #64748B; cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color .15s; }
    .refresh-btn:hover { color: #A5B4FC; }

    /* Account filter chips */
    .account-chips { display: flex; gap: 6px; padding: 10px 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid rgba(148,163,184,.06); }

    .account-chip .acct-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .account-chip .remove-acct:hover { opacity: 1; }

    .sidebar-acct .sacct-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .add-account-btn:hover { border-color: rgba(99,102,241,.3); color: #A5B4FC; }

    .cleaner-header { padding:18px 20px;border-bottom:1px solid rgba(148,163,184,.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0 }
    .cleaner-header h3 { font-size:16px;font-weight:700;color:#F8FAFC;display:flex;align-items:center;gap:10px }
    .cleaner-stats { padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(148,163,184,.06);flex-shrink:0 }
    .cleaner-stat { padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(99,102,241,.1);color:#A5B4FC }
    .cleaner-list { flex:1;overflow-y:auto;padding:4px 0 }
    .cleaner-item { padding:12px 20px;border-bottom:1px solid rgba(148,163,184,.04);display:flex;align-items:flex-start;gap:12px;transition:background .12s }
    .cleaner-item:hover { background:rgba(99,102,241,.04) }
    .cleaner-item.kept { opacity:.4 }
    .cleaner-checkbox { width:18px;height:18px;border-radius:5px;border:2px solid rgba(148,163,184,.25);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s }
    .cleaner-checkbox.checked { background:#6366F1;border-color:#6366F1 }
    .cleaner-reason { display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em }
    .cleaner-actions { display:flex;gap:4px;margin-top:6px }
    .cleaner-actions button { padding:4px 10px;border-radius:6px;border:1px solid rgba(148,163,184,.12);background:rgba(30,41,59,.8);color:#94A3B8;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s }
    .cleaner-actions button:hover { background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#A5B4FC }
    .cleaner-actions button.selected-trash { background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#FCA5A5 }
    .cleaner-actions button.selected-archive { background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#A5B4FC }
    .cleaner-actions button.selected-keep { background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25);color:#86EFAC }
    .cleaner-footer { padding:14px 20px;border-top:1px solid rgba(148,163,184,.1);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0 }
    .cleaner-footer .bulk-select { display:flex;align-items:center;gap:8px;font-size:12px;color:#94A3B8 }
    .cleaner-apply-btn { padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s }
    .cleaner-apply-btn.active { background:linear-gradient(135deg,#4F46E5,#6366F1);color:white }
    .cleaner-apply-btn.active:hover { transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3) }
    .cleaner-apply-btn.disabled { background:rgba(148,163,184,.1);color:#475569;cursor:default }
    .cleaner-progress { padding:24px 20px;text-align:center }
    .cleaner-progress-bar { width:100%;height:6px;background:rgba(148,163,184,.15);border-radius:3px;overflow:hidden;margin:12px 0 }
    .cleaner-progress-fill { height:100%;background:linear-gradient(90deg,#6366F1,#8B5CF6);border-radius:3px;transition:width .3s ease }
    .cleaner-empty { padding:48px 24px;text-align:center }
    .cleaner-done { padding:32px 24px;text-align:center }

    .ic { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    .ic svg { display: block; }

    @media (max-width: 767px) {
      .email-item { padding: 12px 16px; }
      .email-detail { padding: 16px; }
      .email-detail-subject { font-size: 16px; }
      .email-action-bar { flex-wrap: wrap; }
      .tab-btn { font-size: 12px; padding: 10px 8px; }
      .account-chips { padding: 8px 16px; }
    }
  </style>

function loadGoogleScript() {
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.accounts) {
      resolve();
      return;
    }
    // Remove any existing broken script
    const old = document.querySelector('script[src*="accounts.google.com/gsi/client"]');
    if (old) old.remove();
    // Load fresh
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.async = true;
    s.onload = () => {
      const check = () => {
        if (typeof google !== 'undefined' && google.accounts) resolve();
        else setTimeout(check, 200);
      };
      check();
    };
    s.onerror = () => reject(new Error('Failed to load Google sign-in'));
    document.head.appendChild(s);
  });
}

async function handleGmailAuth(tokenResponse) {
  if (tokenResponse.error) {
    state.gmailLoading = false;
    render();
    return;
  }

  const token = tokenResponse.access_token;

  try {
    const profileRes = await fetch(`${GMAIL_API}/profile`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!profileRes.ok) throw new Error("Failed to fetch profile");
    const profile = await profileRes.json();
    const email = profile.emailAddress;

    const existing = state.accounts.find(a => a.email === email);
    if (existing) {
      existing.token = token;
      existing.profile = profile;
      state.gmailLoading = false;
      await fetchAccountEmails(existing);
      return;
    }

    const color = ACCT_COLORS[state.accounts.length % ACCT_COLORS.length];
    const acct = {
      email,
      token,
      profile,
      emails: [],
      color,
      loading: true,
      error: null,
    };
    state.accounts.push(acct);
    state.gmailLoading = false;
    render();
    await fetchAccountEmails(acct);
  } catch (err) {
    state.gmailLoading = false;
    render();
  }
}

async function fetchAccountEmails(acct) {
  acct.loading = true;

  render();

  try {
    const listRes = await fetch(`${GMAIL_API}/messages?maxResults=15&labelIds=INBOX`, {
      headers: { Authorization: `Bearer ${acct.token}` }

    if (!listRes.ok) {

        acct.error = "Session expired. Please reconnect.";
        acct.loading = false;
        render();
        return;
      }
      throw new Error("Failed to fetch");
    }

    const listData = await listRes.json();

    const emails = await Promise.all(
      messageIds.map(async (msg) => {

          headers: { Authorization: `Bearer ${acct.token}` }

function parseGmailMessage(msg, accountEmail, accountColor) {
  const headers = msg.payload.headers || [];
  const getHeader = (name) => {
    const h = headers.find(h => h.name.toLowerCase() === name.toLowerCase());
    return h ? h.value : "";
  };

  const from = getHeader("From");
  const subject = getHeader("Subject") || "(no subject)";
  const date = getHeader("Date");

  let fromName = from;
  let fromEmail = from;
  const match = from.match(/^"?(.+?)"?\s*<(.+?)>$/);
  if (match) {
    fromName = match[1].replace(/"/g, '');
    fromEmail = match[2];
  }

  let dateStr = "";
  let dateObj = null;
  try {
    dateObj = new Date(date);
    const now = new Date();
    const diff = now - dateObj;
    const oneDay = 86400000;
    if (diff < oneDay && dateObj.getDate() === now.getDate()) {
      dateStr = dateObj.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    } else if (diff < 2 * oneDay) {
      dateStr = "Yesterday";
    } else if (diff < 7 * oneDay) {
      dateStr = dateObj.toLocaleDateString([], { weekday: "short" });
    } else {
      dateStr = dateObj.toLocaleDateString([], { month: "short", day: "numeric" });
    }
  } catch(e) { dateStr = date; }

  let body = "";
  function extractText(part) {
    if (part.mimeType === "text/plain" && part.body && part.body.data) {
      body += decodeBase64Url(part.body.data);
    }
    if (part.parts) part.parts.forEach(extractText);
  }
  extractText(msg.payload);
  if (!body && msg.snippet) body = msg.snippet;

  const snippet = msg.snippet || body.substring(0, 120);
  const unread = (msg.labelIds || []).includes("UNREAD");
  const important = (msg.labelIds || []).includes("IMPORTANT");

  let label = "";
  let labelColor = "#6366F1";
  const labelIds = msg.labelIds || [];
  if (labelIds.includes("CATEGORY_PROMOTIONS")) { label = "Promo"; labelColor = "#F59E0B"; }
  else if (labelIds.includes("CATEGORY_UPDATES")) { label = "Updates"; labelColor = "#06B6D4"; }
  else if (labelIds.includes("CATEGORY_SOCIAL")) { label = "Social"; labelColor = "#EC4899"; }
  else if (labelIds.includes("CATEGORY_FORUMS")) { label = "Forums"; labelColor = "#8B5CF6"; }
  else if (important) { label = "Important"; labelColor = "#EF4444"; }

  return {
    id: msg.id,
    threadId: msg.threadId,
    accountEmail,
    accountColor,
    unread,
    important,
    from: fromName,
    email: fromEmail,
    subject,
    snippet,
    body,
    date: dateStr,
    dateObj,
    label,
    labelColor,
    avatarColor: avatarColor(fromName),
  };
}

function decodeBase64Url(data) {
  try {
    const str = data.replace(/-/g, '+').replace(/_/g, '/');
    return decodeURIComponent(atob(str).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
  } catch(e) {
    try { return atob(data.replace(/-/g, '+').replace(/_/g, '/')); }
    catch(e2) { return data; }
  }
}

/* ─── Inbox Cleaner Logic ─── */
const MARKETING_KEYWORDS = ['unsubscribe','newsletter','limited time','exclusive offer','promotion','manage preferences','opt out','sale ends','discount','deal of','weekly digest','monthly update','view in browser','view online','email preferences','no longer wish','manage subscriptions'];
const MARKETING_DOMAINS = ['mailchimp.com','sendgrid.net','substack.com','constantcontact.com','mailgun.org','sendinblue.com','hubspot.com','klaviyo.com','campaign-archive.com','list-manage.com','mailerlite.com','convertkit.com','drip.com','aweber.com','getresponse.com','beehiiv.com'];

function detectMarketingEmails(emails) {
  const flagged = [];
  emails.forEach(e => {
    let reason = null;
    let category = null;

    // 1. Gmail category labels
    if (e.label === 'Promo') { reason = 'Gmail Promotions'; category = 'promotions'; }
    else if (e.label === 'Social') { reason = 'Gmail Social'; category = 'social'; }
    else if (e.label === 'Forums') { reason = 'Gmail Forums'; category = 'forums'; }
    else if (e.label === 'Updates') { reason = 'Gmail Updates'; category = 'updates'; }

    // 2. Keyword analysis
    if (!reason) {
      const searchText = ((e.subject || '') + ' ' + (e.body || '') + ' ' + (e.snippet || '')).toLowerCase();
      const found = MARKETING_KEYWORDS.filter(kw => searchText.includes(kw));
      if (found.length >= 1) {
        reason = 'Keywords: ' + found.slice(0,3).join(', ');
        category = 'keywords';
      }
    }

    // 3. Sender domain check
    if (!reason) {
      const senderDomain = (e.email || '').split('@')[1]?.toLowerCase() || '';
      const matched = MARKETING_DOMAINS.find(d => senderDomain.includes(d));
      if (matched) {
        reason = 'Marketing platform: ' + matched;
        category = 'platform';
      }
    }

    if (reason) flagged.push({ email: e, reason, category, action: null });
  });
  return flagged;
}

async function fetchCleanerEmails() {
  state.cleanerLoading = true;
  state.cleanerEmails = [];
  state.cleanerDone = false;
  state.cleanerResults = null;
  state.cleanerProgress = null;
  render();

  const allEmails = [];

  for (const acct of state.accounts) {
    try {
      const listRes = await fetch(`${GMAIL_API}/messages?maxResults=100&labelIds=INBOX`, {
        headers: { Authorization: `Bearer ${acct.token}` }
      });
      if (!listRes.ok) continue;
      const listData = await listRes.json();
      const messageIds = listData.messages || [];

      // Fetch in parallel batches of 20
      for (let i = 0; i < messageIds.length; i += 20) {
        const batch = messageIds.slice(i, i + 20);
        const results = await Promise.all(
          batch.map(async msg => {
            const res = await fetch(`${GMAIL_API}/messages/${msg.id}?format=full`, {
              headers: { Authorization: `Bearer ${acct.token}` }
            });
            if (!res.ok) return null;
            return res.json();
          })
        );
        const parsed = results.filter(Boolean).map(m => parseGmailMessage(m, acct.email, acct.color));
        allEmails.push(...parsed);
      }
    } catch (err) {
      console.error('Cleaner fetch error:', acct.email, err);
    }
  }

  state.cleanerEmails = detectMarketingEmails(allEmails);
  state.cleanerLoading = false;
  render();
}

      'Content-Type': 'application/json'

  });

}

async function applyCleanerActions() {
  const actionable = state.cleanerEmails.filter(item => item.action === 'trash' || item.action === 'archive');
  if (actionable.length === 0) return;

  state.cleanerProgress = { done: 0, total: actionable.length };
  render();

  let trashed = 0, archived = 0, failed = 0;
  const BATCH = 10;

  for (let i = 0; i < actionable.length; i += BATCH) {
    const batch = actionable.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(async item => {
      const acct = state.accounts.find(a => a.email === item.email.accountEmail);
      if (!acct) return false;
      try {
        if (item.action === 'trash') return await trashEmail(item.email.id, acct.token);
        if (item.action === 'archive') return await archiveEmail(item.email.id, acct.token);
      } catch(e) { return false; }
      return false;
    }));

    results.forEach((ok, j) => {
      if (ok) {
        if (batch[j].action === 'trash') trashed++;
        else archived++;
      } else failed++;
    });

    state.cleanerProgress.done = Math.min(i + BATCH, actionable.length);
    render();

    if (i + BATCH < actionable.length) await new Promise(r => setTimeout(r, 100));
  }

  state.cleanerProgress = null;
  state.cleanerDone = true;
  state.cleanerResults = { trashed, archived, failed };
  render();

  // Refresh inbox after a short delay
  setTimeout(() => { refreshAllEmails(); }, 500);
}

    return "Here's your meeting prep framework:\n\n**1. Objective** — Define the key outcome\n**2. Agenda** — 3-5 discussion points with time\n**3. Background** — Key data and context\n**4. Questions** — 2-3 strategic questions\n**5. Action items** — Expected next steps\n\nShare the meeting topic and I'll build a detailed prep brief.";
  if (l.includes("research")||l.includes("analyze")||l.includes("trend"))
    return "I'll help with that research. To give you the best analysis:\n\n**1. Scope** — What specific aspect?\n**2. Depth** — Quick overview or deep dive?\n**3. Format** — Summary, bullets, or full report?\n**4. Audience** — Who will see this?\n\nI'll put together key findings, data points, and actionable insights.";
  if (l.includes("task")||l.includes("to-do")||l.includes("todo")||l.includes("priorit"))
    return "Let's organize your tasks:\n\n**Urgent & Important** — Do first\n• [Critical deadlines]\n\n**Important, Not Urgent** — Schedule\n• [Strategic work]\n\n**Urgent, Not Important** — Delegate\n• [Routine requests]\n\n**Neither** — Defer or eliminate\n\nTell me what's on your plate and I'll prioritize everything.";
  if (l.includes("write")||l.includes("document")||l.includes("report"))
    return "Ready to help you write. I'll need:\n\n**1. Type** — Report, memo, proposal?\n**2. Audience** — Who reads this?\n**3. Key message** — Main takeaway?\n**4. Tone** — Formal, conversational, persuasive?\n**5. Length** — Rough target?\n\nShare these and I'll create a polished draft.";
  if (l.includes("brainstorm")||l.includes("idea"))
    return "Let's brainstorm! Tell me:\n\n• What problem are you solving?\n• Any constraints?\n• What's been tried before?\n\nI'll generate ideas from multiple angles — conventional, creative, and wild cards. What topic should we explore?";
  return "I'm here to help! I can:\n\n• **Draft & refine** — emails, documents, presentations\n• **Research & analyze** — trends, data, competitive insights\n• **Plan & organize** — meetings, tasks, schedules\n• **Strategize** — brainstorm, evaluate options, decisions\n\nGive me more detail and I'll get right on it.";
}

    html += `<div style="padding:40px;text-align:center;color:#64748B;font-size:14px">No emails found.</div>`;

function renderCleanerView() {
  let html = '<div class="cleaner-overlay" onclick="if(event.target===this)closeCleaner()">';
  html += '<div class="cleaner-panel">';

  // Header
  html += '<div class="cleaner-header">';
  html += `<h3>${icon('shield',18,'#A5B4FC')} Inbox Cleaner</h3>`;
  html += `<button onclick="closeCleaner()" style="background:none;border:none;color:#94A3B8;cursor:pointer;padding:4px">${icon('x',18)}</button>`;
  html += '</div>';

  // Loading state
  if (state.cleanerLoading) {
    html += '<div class="cleaner-progress">';
    html += '<div class="spinner" style="margin:0 auto 16px"></div>';
    html += '<div style="font-size:14px;color:#94A3B8">Scanning your inbox for marketing emails...</div>';
    html += '<div style="font-size:12px;color:#475569;margin-top:6px">Checking up to 100 emails per account</div>';
    html += '</div>';
    html += '</div></div>';
    return html;
  }

  // Progress state (batch operations)
  if (state.cleanerProgress) {
    const pct = Math.round((state.cleanerProgress.done / state.cleanerProgress.total) * 100);
    html += '<div class="cleaner-progress">';
    html += `<div style="font-size:14px;color:#F1F5F9;margin-bottom:4px">Cleaning your inbox...</div>`;
    html += `<div style="font-size:12px;color:#94A3B8">${state.cleanerProgress.done} of ${state.cleanerProgress.total} processed</div>`;
    html += '<div class="cleaner-progress-bar"><div class="cleaner-progress-fill" style="width:' + pct + '%"></div></div>';
    html += '</div>';
    html += '</div></div>';
    return html;
  }

  // Done state
  if (state.cleanerDone && state.cleanerResults) {
    const r = state.cleanerResults;
    html += '<div class="cleaner-done">';
    html += `<div style="width:56px;height:56px;border-radius:14px;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${icon('check',24,'#22C55E')}</div>`;
    html += '<div style="font-size:18px;font-weight:700;color:#F8FAFC;margin-bottom:8px">Inbox Cleaned!</div>';
    const parts = [];
    if (r.trashed) parts.push(r.trashed + ' trashed');
    if (r.archived) parts.push(r.archived + ' archived');
    if (r.failed) parts.push(r.failed + ' failed');
    html += `<div style="font-size:14px;color:#94A3B8;margin-bottom:20px">${parts.join(' Â· ')}</div>`;
    if (r.failed > 0) {
      html += '<div style="font-size:12px;color:#FCA5A5;margin-bottom:16px">Some emails failed — you may need to reconnect your account for updated permissions.</div>';
    }
    html += `<button onclick="closeCleaner()" style="padding:10px 24px;border-radius:8px;border:none;background:linear-gradient(135deg,#4F46E5,#6366F1);color:white;font-size:14px;font-weight:600;cursor:pointer">Done</button>`;
    html += '</div>';
    html += '</div></div>';
    return html;
  }

  // Empty state
  if (state.cleanerEmails.length === 0) {
    html += '<div class="cleaner-empty">';
    html += `<div style="width:56px;height:56px;border-radius:14px;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${icon('check',24,'#22C55E')}</div>`;
    html += '<div style="font-size:18px;font-weight:700;color:#F8FAFC;margin-bottom:8px">Your inbox is clean!</div>';
    html += '<div style="font-size:14px;color:#94A3B8;margin-bottom:20px">No promotional or marketing emails were detected.</div>';
    html += `<button onclick="closeCleaner()" style="padding:10px 24px;border-radius:8px;border:none;background:rgba(148,163,184,.1);color:#CBD5E1;font-size:14px;font-weight:500;cursor:pointer">Close</button>`;
    html += '</div>';
    html += '</div></div>';
    return html;
  }

  // Stats
  const cats = {};
  state.cleanerEmails.forEach(item => {
    const c = item.category;
    cats[c] = (cats[c] || 0) + 1;
  });
  const catLabels = { promotions:'Promos', social:'Social', forums:'Forums', updates:'Updates', keywords:'Marketing', platform:'Newsletters' };
  const catColors = { promotions:'#F59E0B', social:'#EC4899', forums:'#8B5CF6', updates:'#06B6D4', keywords:'#EF4444', platform:'#10B981' };

  html += '<div class="cleaner-stats">';
  html += `<span class="cleaner-stat" style="background:rgba(99,102,241,.15)">${state.cleanerEmails.length} found</span>`;
  Object.keys(cats).forEach(c => {
    html += `<span class="cleaner-stat" style="background:${catColors[c]||'#6366F1'}18;color:${catColors[c]||'#A5B4FC'}">${cats[c]} ${catLabels[c]||c}</span>`;
  });
  html += '</div>';

  // Select all bar
  const actionable = state.cleanerEmails.filter(i => i.action === 'trash' || i.action === 'archive');
  html += '<div style="padding:8px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(148,163,184,.06);font-size:12px;color:#94A3B8">';
  html += `<button onclick="toggleCleanerSelectAll('archive')" style="background:none;border:none;color:#A5B4FC;cursor:pointer;font-size:12px;font-weight:500">Archive All</button>`;
  html += '<span style="color:#334155">|</span>';
  html += `<button onclick="toggleCleanerSelectAll('trash')" style="background:none;border:none;color:#FCA5A5;cursor:pointer;font-size:12px;font-weight:500">Trash All</button>`;
  html += '<span style="flex:1"></span>';
  html += `<span>${actionable.length} selected</span>`;
  html += '</div>';

  // Email list
  html += '<div class="cleaner-list">';
  state.cleanerEmails.forEach((item, idx) => {
    const e = item.email;
    const initials = e.from.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const isKept = item.action === 'keep';

    html += `<div class="cleaner-item ${isKept?'kept':''}">`;

    // Avatar
    html += `<div style="position:relative;flex-shrink:0"><div style="width:32px;height:32px;border-radius:8px;background:${e.avatarColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white">${initials}</div>`;
    if (state.accounts.length > 1) {
      html += `<div style="position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:${e.accountColor};border:2px solid #1E293B"></div>`;
    }
    html += '</div>';

    // Content
    html += '<div style="flex:1;min-width:0">';
    html += `<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:2px">`;
    html += `<span style="font-size:13px;font-weight:${e.unread?600:400};color:${e.unread?'#F1F5F9':'#94A3B8'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.from)}</span>`;
    html += `<span style="font-size:11px;color:#475569;flex-shrink:0">${e.date}</span>`;
    html += '</div>';
    html += `<div style="font-size:12px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px">${esc(e.subject)}</div>`;
    html += `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">`;
    html += `<span class="cleaner-reason" style="background:${catColors[item.category]||'#6366F1'}18;color:${catColors[item.category]||'#A5B4FC'}">${esc(item.reason)}</span>`;
    html += '</div>';

    // Inline action buttons
    html += '<div class="cleaner-actions">';
    html += `<button class="${item.action==='keep'?'selected-keep':''}" onclick="setCleanerAction(${idx},'keep')">${icon('check',11)} Keep</button>`;
    html += `<button class="${item.action==='archive'?'selected-archive':''}" onclick="setCleanerAction(${idx},'archive')">${icon('archive',11)} Archive</button>`;
    html += `<button class="${item.action==='trash'?'selected-trash':''}" onclick="setCleanerAction(${idx},'trash')">${icon('trash',11)} Trash</button>`;
    html += '</div>';

    html += '</div></div>';
  });
  html += '</div>';

  // Footer with apply button
  html += '<div class="cleaner-footer">';
  html += '<div class="bulk-select">';
  html += `<span>${actionable.length} of ${state.cleanerEmails.length} will be cleaned</span>`;
  html += '</div>';
  const canApply = actionable.length > 0;
  html += `<button class="cleaner-apply-btn ${canApply?'active':'disabled'}" ${canApply?'onclick="applyCleanerActions()"':''}>${icon('shield',14)} Apply to ${actionable.length} email${actionable.length!==1?'s':''}</button>`;
  html += '</div>';

  html += '</div></div>';
  return html;
}

function renderChatView(mob, has, filtered, today) {
  let html = `<div class="content-inner" style="max-width:720px;margin:0 auto;padding:${mob?'20px 16px':'48px 28px'}">`;

  if (!has) {
    if (mob && state.installHint) {
      html += `<div class="install-hint">${icon('share',16)}<span style="flex:1">Tap <strong>Share → Add to Home Screen</strong> to use like a native app</span><button onclick="dismissInstall()" style="background:none;border:none;color:#64748B;cursor:pointer;padding:2px">${icon('x',14)}</button></div>`;
    }

    html += `<div style="margin-bottom:${mob?28:40}px">`;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${icon('coffee',18,'#F59E0B')}<span style="font-size:12px;color:#F59E0B;font-weight:500">${today}</span></div>`;
    html += `<h1 class="greeting-title" style="font-size:28px;font-weight:700;color:#F8FAFC;margin:0 0 6px;letter-spacing:-.02em">${greeting()}, Saher</h1>`;
    html += `<p style="font-size:${mob?14:15}px;color:#94A3B8;margin:0;line-height:1.5">How can I help you today?</p></div>`;

    html += `<div style="margin-bottom:${mob?28:36}px"><div style="font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Suggestions</div>`;
    html += `<div class="suggestions-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    SUGGESTIONS.forEach(s => {
      html += `<button class="suggestion-btn" onclick="sendMsg('${esc(s.text)}')">${icon(s.icon,16,null)}<span style="flex:1">${esc(s.text)}</span>${icon('arrow-right',14)}</button>`;
    });
    html += `</div></div>`;

    html += `<div><div style="font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Quick Actions</div>`;
    html += `<div class="chips">`;
    CATEGORIES.forEach(c => {
      html += `<button class="chip ${state.category===c.id?'active':''}" onclick="setCategory('${c.id}')">${c.label}</button>`;
    });
    html += `</div>`;
    html += `<div class="actions-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">`;
    filtered.forEach(a => {
      html += `<button class="action-btn" onclick="fillInput('${esc(a.prompt)} ')"><div class="icon-circle" style="background:${a.color}18">${icon(a.icon,16,a.color)}</div>${a.label}</button>`;
    });
    html += `</div></div>`;
  } else {
    state.messages.forEach(m => {
      html += `<div class="msg-row ${m.role}">`;
      if (m.role === "assistant") html += `<div class="avatar" style="width:${mob?28:32}px;height:${mob?28:32}px;margin-top:2px">${icon('sparkles',mob?13:15,'white')}</div>`;
      html += `<div class="msg-bubble ${m.role}">${boldify(m.content)}<div class="msg-time ${m.role}">${fmtTime(m.time)}</div></div>`;
      html += `</div>`;
    });
    if (state.typing) {
      html += `<div class="msg-row"><div class="avatar" style="width:${mob?28:32}px;height:${mob?28:32}px">${icon('sparkles',mob?13:15,'white')}</div><div class="msg-bubble assistant"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
    }
    html += `<div id="scroll-anchor"></div>`;
  }

  html += `</div>`;
  return html;
}

/* ─── Actions ─── */
function openSidebar() { state.sidebarOpen=true; render(); }
function closeSidebar() { state.sidebarOpen=false; render(); }
function newChat() { state.messages=[]; state.sidebarOpen=false; state.view="chat"; render(); }
function setCategory(id) { state.category=id; state.sidebarOpen=false; render(); }
function dismissInstall() { state.installHint=false; render(); }
function switchView(v) { state.view=v; state.selectedEmail=null; render(); }
function openEmail(id) { state.selectedEmail=id; render(); }
function backToInbox() { state.selectedEmail=null; render(); }
function setAccountFilter(f) { state.activeFilter=f; render(); }

function replyToEmail(id) {
  const e = findEmailById(id);
  if (!e) return;
  state.view = "chat";
  state.selectedEmail = null;
  sendMsg("Help me reply to the email from " + e.from + " about: " + e.subject);
}

function draftFollowUp(id) {
  const e = findEmailById(id);
  if (!e) return;
  state.view = "chat";
  state.selectedEmail = null;
  sendMsg("Draft a follow-up email to " + e.from + " (" + e.email + ") regarding: " + e.subject);
}

function fillInput(text) {
  state.input = text; render();
  const inp = document.getElementById("msg-input");
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function onInput(e) {
  state.input = e.target.value;
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
}

function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendFromInput(); } }

function sendFromInput() {
  if (!state.input.trim() || state.typing) return;
  sendMsg(state.input.trim());
}

function sendMsg(text) {
  state.messages.push({ role: "user", content: text, time: new Date() });
  state.input = "";
  state.typing = true;
  state.sidebarOpen = false;
  state.view = "chat";
  render();
  setTimeout(() => {
    state.messages.push({ role: "assistant", content: respond(text), time: new Date() });
    state.typing = false;
    render();
  }, 700 + Math.random() * 1000);
}

/* ─── Init ─── */
window.addEventListener("resize", render);
render();

// Remove ALL service workers and caches — they cause issues with Google sign-in
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

// Init Gmail client
setTimeout(initGmailClient, 300);
</script>
